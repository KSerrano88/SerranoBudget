version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: serrano-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: serranobudget
      POSTGRES_USER: serrano
      POSTGRES_PASSWORD: serrano_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  postgres_data:
